<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Learninx — Demo</title>
  <meta name="description" content="A short walkthrough of Learninx, the in-browser Linux learning platform." />
  <meta property="og:title" content="Learninx — Demo" />
  <meta property="og:description" content="Lessons, in-browser terminal, and boss-level sandbox — autoplaying demo." />
  <meta property="og:type" content="video.other" />
  <style>
    :root { color-scheme: dark light; }
    html, body { margin: 0; height: 100%; background: #0b1020; }
    body {
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: #e5e7eb;
      display: flex; flex-direction: column; min-height: 100%;
    }
    header {
      padding: 18px 24px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #1f2937;
      background: rgba(255,255,255,0.02);
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
    header a { color: #38bdf8; text-decoration: none; }
    header a:hover { text-decoration: underline; }
    .stage {
      flex: 1; display: grid; place-items: center;
      padding: 16px; box-sizing: border-box;
    }
    .frame {
      width: min(100%, 1100px);
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06);
      background: #000;
    }
    video {
      width: 100%; height: 100%; display: block; object-fit: cover; background: #000;
    }
    footer {
      padding: 12px 24px; font-size: 12px; color: #94a3b8;
      display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    footer a { color: #94a3b8; }
  </style>
</head>
<body>
  <header>
    <h1>Learninx — Demo</h1>
    <span style="color:#64748b">·</span>
    <a href="../">← Back to README</a>
  </header>

  <div class="stage">
    <div class="frame">
      <video
        id="player"
        src="../public/Learninx%20%E2%80%94%20Learn%20Linux%20the%20Easy%20Way.mp4"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
        controls
        controlslist="nodownload noplaybackrate"
      ></video>
    </div>
  </div>

  <footer>
    <span>Hosted with GitHub Pages · plays automatically</span>
    <a href="../public/Learninx%20%E2%80%94%20Learn%20Linux%20the%20Easy%20Way.mp4" target="_blank" rel="noopener">
      Direct video link
    </a>
  </footer>

  <script>
    // Belt-and-braces: try to autoplay after load in case the attribute was stripped.
    const v = document.getElementById('player');
    const tryPlay = () => v.play().catch(() => { /* user gesture may be required; controls are shown */ });
    if (v.readyState >= 2) tryPlay();
    else v.addEventListener('canplay', tryPlay, { once: true });
    document.addEventListener('visibilitychange', () => { if (!document.hidden) tryPlay(); });
  </script>
</body>
</html>
